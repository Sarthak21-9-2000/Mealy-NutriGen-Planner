<!DOCTYPE html>
<html>
<head>
    <title>Mealy-NutriGen Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container text-center mt-5">
    <h1 class="mb-4">🥗Mealy - AI Meal Planner</h1>

    <form action="/generate" method="post" class="card p-4 bg-secondary shadow">
        <label class="mb-2">Select Diet</label>
        <select name="diet" placeholder="Select Diet" class="form-select mb-3">
            <option value="veg">Vegetarian</option>
            <option value="nonveg">Non-Vegetarian</option>
        </select>
        <input type="number" name="age" placeholder="Age" class="form-control mb-3">
        <input type="number" name="weight" placeholder="Weight (kg)" class="form-control mb-3">
        <input type="number" name="height" placeholder="Height (cm)" class="form-control mb-3">

        <select name="goal" placeholder="Select Goal" class="form-control mb-3">
            <option value="weight loss">Weight Loss</option>
            <option value="weight gain">Weight Gain</option>
            <option value="maintain">Maintain</option>
        </select>
        <button class="btn btn-success" onclick="this.innerText='Generating...'">
        Generate Plan 🚀
        </button>
    </form>
</div>

</body>
</html>
